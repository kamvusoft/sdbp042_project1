<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">
    <h1>CRUD Admin Dashboard</h1>

    <section class="form-section">
      <h2 id="formTitle">Add New Post</h2>

      <form id="postForm">
        <input type="hidden" id="postId" />

        <div class="form-group">
          <label for="titleInput">Title</label>
          <input 
            type="text" 
            id="titleInput" 
            placeholder="Enter post title" 
            required
          />
        </div>

        <div class="form-group">
          <label for="bodyInput">Body</label>
          <textarea 
            id="bodyInput" 
            placeholder="Enter post body" 
            required
          ></textarea>
        </div>

        <button type="submit" id="submitBtn">Add Post</button>
        <button type="button" id="cancelBtn" class="secondary hidden">Cancel Edit</button>
      </form>
    </section>

    <section class="search-section">
      <input 
        type="text" 
        id="searchInput" 
        placeholder="Search posts by title..."
      />
    </section>

    <p id="loadingMessage" class="message">Loading posts...</p>
    <p id="errorMessage" class="error hidden">Something went wrong. Please try again.</p>

    <section id="postsContainer" class="posts-container">
      <!-- Posts will appear here -->
    </section>
  </div>

  <script type="module" src="lib/model.js"></script>
  <script type="module" src="lib/store.js"></script>
  <script type="module" src="lib/api.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
